<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Réservation - Mathy Beauty</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fafafa;
            margin: 0;
            padding: 10px;
            color: #333;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 15px;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            text-align: center;
        }
        h1 {
            color: #d4a373;
            font-size: 22px;
            margin-bottom: 5px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 15px;
            font-size: 14px;
        }
        
        /* Ajustement de la zone Calendly pour éviter l'effet "écrasé" */
        #calendly-inline-widget {
            min-width: 320px;
            height: 950px; /* Augmenté à 950px pour laisser respirer l'agenda sur mobile */
            border: none;
        }

        /* Zone de paiement cachée au début */
        #payment-section {
            display: none;
            max-width: 450px;
            margin: 40px auto;
            padding: 20px;
            animation: fadeIn 0.5s ease-in-out;
        }
        .icon-success {
            font-size: 50px;
            margin-bottom: 15px;
        }
        .btn-paiement {
            display: block;
            width: 100%;
            box-sizing: border-box;
            text-decoration: none;
            padding: 16px 20px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 15px;
            transition: all 0.3s ease;
        }
        .paypal {
            background-color: #0070ba;
            color: white;
            box-shadow: 0 4px 12px rgba(0, 112, 186, 0.3);
        }
        .lydia {
            background-color: #00aaff;
            color: white;
            box-shadow: 0 4px 12px rgba(0, 170, 255, 0.3);
        }
        .btn-paiement:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container">
    
    <!-- ÉTAPE 1 : L'AGENDA -->
    <div id="booking-section">
        <h1>Sélectionnez votre créneau ✨</h1>
        <p class="subtitle">Trouvez le moment idéal. L'acompte vous sera demandé juste après.</p>
        
        <!-- Conteneur Calendly -->
        <div id="calendly-inline-widget"></div>
    </div>

    <!-- ÉTAPE 2 : LE PAIEMENT -->
    <div id="payment-section">
        <div class="icon-success">🎉</div>
        <h1>Créneau réservé !</h1>
        <p class="subtitle">Pour bloquer définitivement votre rendez-vous, veuillez régler l'acompte de 15€ ci-dessous :</p>

        <!-- Liens de paiement (à personnaliser) -->
        <a href="https://paypal.me/TON_COMPTE/15" target="_blank" class="btn-paiement paypal">
            Payer l'acompte avec PayPal (15€)
        </a>

        <a href="https://lydia-app.com/collect/TON_LIEN_LYDIA" target="_blank" class="btn-paiement lydia">
            Payer par Carte Bancaire / Lydia (15€)
        </a>
    </div>

</div>

<!-- Script officiel de Calendly -->
<script type="text/javascript" src="https://assets.calendly.com/assets/external/widget.js" async></script>

<script>
    // Initialisation
    window.addEventListener('load', function() {
        Calendly.initInlineWidget({
            url: 'https://calendly.com/magrheb-uniited/2hours', // Ton lien de test
            parentElement: document.getElementById('calendly-inline-widget'),
            prefill: {},
            utm: {}
        });
    });

    // Écoute du signal de validation
    window.addEventListener('message', function(e) {
        if (e.data.event && e.data.event === 'calendly.event_scheduled') {
            // Masquage de l'agenda et affichage des boutons de paiement
            document.getElementById('booking-section').style.display = 'none';
            document.getElementById('payment-section').style.display = 'block'; // Correction de la typo ici !
            
            // Remonte automatiquement l'écran de l'utilisateur tout en haut pour qu'il voie les boutons
            window.scrollTo({top: 0, behavior: 'smooth'});
        }
    });
</script>

</body>
</html>
