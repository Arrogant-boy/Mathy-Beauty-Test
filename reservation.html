    <script>
        const checkboxes = document.querySelectorAll('.service-row input[type="checkbox"]');
        const submitBtn = document.getElementById('submit-btn');

        function calculateTotal() {
            let total = 0;
            let selectedServices = [];

            checkboxes.forEach(box => {
                if (box.checked) {
                    // Trouver le prix textuel à côté (ex: "50 €") et extraire le chiffre 50
                    const priceText = box.closest('.service-row').querySelector('.service-price').textContent;
                    const price = parseInt(priceText.replace(/[^0-9]/g, ''), 10);
                    
                    total += price;
                    // Ajouter le nom de la prestation à notre liste de choix
                    selectedServices.push(`${box.value} (${price}€)`);
                }
            });

            // Mettre à jour visuellement le texte du bouton continuer
            if (total > 0) {
                submitBtn.textContent = `Continuer (${total} €)`;
            } else {
                submitBtn.textContent = "Continuer";
            }

            // Sauvegarder les données en mémoire pour les pages suivantes
            localStorage.setItem('mathy_total_price', total);
            localStorage.setItem('mathy_selected_services', JSON.stringify(selectedServices));
        }

        // Écouter les clics sur chaque ligne de prestation
        checkboxes.forEach(box => {
            box.addEventListener('change', calculateTotal);
        });

        // Calculer dès le départ (au cas où des cases restent cochées au rechargement)
        calculateTotal();
    </script>
